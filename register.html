<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body>

<h2>Register</h2>
<input type="text" id="newUser" placeholder="Username"><br><br>
<input type="password" id="newPass" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<script>
function register(){
    localStorage.setItem("user", document.getElementById("newUser").value);
    localStorage.setItem("pass", document.getElementById("newPass").value);
    alert("Registered Successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
